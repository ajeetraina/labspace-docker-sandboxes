title: Safe AI Agent Execution with Docker Sandboxes
description: |
  Every developer has had that moment — you asked an AI coding agent to "clean things
  up" and it deleted something important. Or it quietly read your AWS credentials.

  This workshop tells one real story: a developer uses an AI agent to refactor
  ExpenseFlow, a Node.js expense tracker with live Stripe and AWS keys. Without
  Docker Sandboxes, the agent has full access to the filesystem, every credential,
  and the entire network. With sbx, it runs inside a microVM with only the project
  mounted — your host stays completely untouched.

  You'll explore all three threat vectors hands-on inside this Labspace, then learn
  how a single command — sbx run — eliminates all of them on your own machine.
